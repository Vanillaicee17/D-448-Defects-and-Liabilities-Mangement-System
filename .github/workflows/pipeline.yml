name: Security Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  devsecops:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Safety
        continue-on-error: true
        uses: pyupio/safety-action@v1
        with:
          api-key: ${{ secrets.SAFETY_API_KEY }}
          args: --detailed-output

      - name: Run pip-audit
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit

      - name: Run Bandit (SAST)
        continue-on-error: true
        run: |
          pip install bandit
          bandit -r .

  image_scan:
    name: Build docker image and Scan image
    runs-on: ubuntu-latest
    needs: devsecops

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker
        uses: docker/setup-docker-action@4.6.0

      - name: Docker Login
        run: docker build -f Dockerfile -t myapp:latest .

      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Docker Scout Scan
        continue-on-error: true
        uses: docker/scout-action@v1.18.2
        with:
          command: quickview, cves
          image: local://myapp:latest
          only-severities: high, critical

      - name: Trivy Docker image
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: "myapp:latest"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
